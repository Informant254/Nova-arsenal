name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          
      - name: Install ruff
        run: pip install ruff
        
      - name: Check Python linting
        run: ruff check .
        
      - name: Check Python formatting
        run: ruff format --check .

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          
      - name: Install basedpyright
        run: pip install basedpyright
        
      - name: Run type checking
        run: basedpyright nova_arsenal/

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          
      - name: Install dependencies
        run: pip install -e ".[dev]"
        
      - name: Run tests with coverage
        run: pytest tests/ -v --cov=nova_arsenal --cov-report=xml
        
      - name: Upload coverage
        if: matrix.python-version == '3.13'
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false

  web-build:
    name: Web Client Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: clients/web/package-lock.json
          
      - name: Install dependencies
        working-directory: clients/web
        run: npm ci
        
      - name: Build
        working-directory: clients/web
        run: npm run build

  docker-build:
    name: Docker Build (${{ matrix.image }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image: [agent, web]
    steps:
      - uses: actions/checkout@v7
      
      - uses: docker/setup-buildx-action@v3
      
      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: containers/Dockerfile.${{ matrix.image }}
          push: false
          tags: nova-${{ matrix.image }}:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  ci-ok:
    name: CI OK
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, web-build, docker-build]
    steps:
      - name: All checks passed
        run: echo "✓ All CI checks passed"
