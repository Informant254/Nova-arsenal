        echo "🎯  TARGET SELECTION"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

        python3 << 'TARGETSEL'
import os, json, random, sys
from pathlib import Path

WORKSPACE   = os.environ.get("NOVA_WORKSPACE", "/root/nova_workspace")
target_in   = os.environ.get("INPUT_TARGET", "").strip()
program_in  = os.environ.get("INPUT_PROGRAM", "shopify").strip()
max_t       = int(os.environ.get("NOVA_MAX_TARGETS", "3"))

# Load scope map if present
scope_map = {}
for f in ["targets_scope_map.json"]:
    if Path(f).exists():
        try:
            scope_map = json.loads(Path(f).read_text())
        except: pass

# Priority targets file
priority_targets = []
for f in ["targets_priority.txt", "targets.txt"]:
    if Path(f).exists():
        lines = [l.strip() for l in Path(f).read_text().splitlines()
                 if l.strip() and not l.strip().startswith("#")]
        priority_targets.extend(lines)

if target_in:
    targets = [target_in]
elif priority_targets:
    targets = priority_targets[:max_t]
else:
    targets = ["https://juice-shop.herokuapp.com"]

# Validate scope
def in_scope(url):
    try:
        from nova_scope_manager import NovaScopeManager
        sm = NovaScopeManager()
        return sm.is_in_scope(url, program_in)
    except:
        # Basic check: not localhost, not internal IP
        import re
        bad = [r"127\.", r"192\.168\.", r"10\.", r"172\.(1[6-9]|2[0-9]|3[01])\.",
               r"localhost", r"0\.0\.0\.0"]
        return not any(re.search(p, url) for p in bad)

targets = [t for t in targets if in_scope(t)][:max_t]

# Write target list
outfile = Path(WORKSPACE) / "selected_targets.json"
outfile.write_text(json.dumps({
    "targets": targets,
    "program": program_in,
    "count": len(targets),
    "scope_map": scope_map
}, indent=2))

print(f"✅ Selected {len(targets)} target(s):")
for t in targets:
    print(f"   → {t}")
TARGETSEL

