try:
    from nova_hypothesis_engine import HypothesisEngine, Hypothesis

    # Load codebase intelligence
    codebase  = json.loads((ws/"codebase_findings.json").read_text()) if (ws/"codebase_findings.json").exists() else {}
    brief     = (ws/"attack_brief.txt").read_text()[:4000]             if (ws/"attack_brief.txt").exists() else ""
    profiles  = json.loads((ws/"behavioral_profiles.json").read_text()) if (ws/"behavioral_profiles.json").exists() else []

    # Detect tech from brief
    tech_signals = []
    for tech in ["php","python","java","node","ruby","wordpress","graphql","jwt","spring","nginx","solidity"]:
        if tech.lower() in brief.lower():
            tech_signals.append(tech)

    eng = HypothesisEngine()

    # Inject boosted priors from codebase intelligence
    boosted = codebase.get("boosted_priors", {})
    for vuln_type, prior in boosted.items():
        if hasattr(eng, 'TECH_PRIORS'):
            for tech_priors in eng.TECH_PRIORS.values():
                if vuln_type in tech_priors:
                    tech_priors[vuln_type] = max(tech_priors[vuln_type], prior)

    # Generate hypotheses
    all_hypos = []
    if hasattr(eng, 'generate_for_target'):
        all_hypos = eng.generate_for_target(target, tech_signals)
    elif hasattr(eng, 'seed_from_tech'):
        all_hypos = eng.seed_from_tech(tech_signals, target)
    else:
        # Manual seeding from tech signals
        for tech in (tech_signals or ["unknown"]):
            priors = eng.TECH_PRIORS.get(tech, eng.TECH_PRIORS["unknown"])
            for vuln_type, prior in priors.items():
                boosted_prior = boosted.get(vuln_type, prior)
                h = Hypothesis(
                    vuln_type   = vuln_type,
                    description = f"{vuln_type} vulnerability in {tech} app",
                    target      = target,
                    prior       = boosted_prior,
                    severity    = "critical" if boosted_prior >= 0.8 else "high" if boosted_prior >= 0.6 else "medium"
                )
                all_hypos.append(h)

    # Add hypotheses for behavioral findings
    for profile in profiles:
        behavior = profile.get("behavior", {})
        ep       = profile.get("endpoint", "")
        if behavior.get("leaks_sql"):
            h = Hypothesis("sqli", f"SQL leakage in {ep}", target, prior=0.80, severity="critical")
            all_hypos.append(h)
        if behavior.get("leaks_path"):
            h = Hypothesis("path_traversal", f"Path disclosure in {ep}", target, prior=0.75, severity="high")
            all_hypos.append(h)
        if behavior.get("leaks_stack"):
            h = Hypothesis("info_disclosure", f"Stack trace in {ep}", target, prior=0.70, severity="medium")
            all_hypos.append(h)

    # Probe and update confidence
    if hasattr(eng, 'probe_all'):
        eng.probe_all(all_hypos)
    else:
        for h in all_hypos[:30]:
            if hasattr(eng, 'probe'):
                eng.probe(h)

    # Sort by priority
    confirmed    = [h for h in all_hypos if getattr(h,'confirmed',False)]
    high_priority = sorted(all_hypos, key=lambda h: getattr(h,'priority',0), reverse=True)[:20]

    out = [h.to_finding() if hasattr(h,'to_finding') else
           {"vuln_type":getattr(h,'vuln_type','?'),"confidence":getattr(h,'confidence',0),
            "severity":getattr(h,'severity','?'),"target":getattr(h,'target','?')}
           for h in high_priority]

    (ws / "hypotheses.json").write_text(json.dumps(out, indent=2, default=str))

    print(f"✅ Hypothesis Engine: {len(all_hypos)} total, {len(confirmed)} confirmed")
    print(f"   Top hypotheses:")
    for h in high_priority[:8]:
        icon = "✅" if getattr(h,'confirmed',False) else "🔬"
        print(f"     {icon} [{getattr(h,'severity','?').upper():<8}] {getattr(h,'vuln_type','?')} "
              f"conf={getattr(h,'confidence',0):.2f}")
except Exception as e:
    print(f"ℹ️  HypothesisEngine: {e}")
    import traceback; traceback.print_exc()
    (ws / "hypotheses.json").write_text("[]")
