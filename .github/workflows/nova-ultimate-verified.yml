    )
    for f in sorted(all_findings, key=lambda x: {"CRITICAL":0,"HIGH":1}.get(str(x.get("severity","")).upper(),9))[:5]:
        sv   = str(f.get("severity","?")).upper()
        name = f.get("name", f.get("type", f.get("title","?")))
        conf = f.get("confidence",0)
        msg += f"  • [{sv}] {name} ({conf:.0%})\n"

    msg += f"\n🏃 Run: [{run_id[:8]}](https://github.com/{repo}/actions/runs/{run_id})\n"
    msg += f"⏱️ {now}"

    try:
        payload = json.dumps({"chat_id": tg_chat, "text": msg, "parse_mode": "Markdown"}).encode()
        req = urllib.request.Request(
            f"https://api.telegram.org/bot{tg_tok}/sendMessage",
            data=payload, headers={"Content-Type":"application/json"}, method="POST"
        )
        with urllib.request.urlopen(req, timeout=15) as r:
            print(f"✅ Telegram: sent ({r.status})")
    except Exception as e:
        print(f"⚠️  Telegram: {e}")

# ── GitHub Issue ───────────────────────────────────────────────────────────────
if gh_tok and repo and (c+h > 0 or all_findings):
    report_md = ""
    rpath = list((ws/"reports").glob("nova_v5_*.md"))
    if rpath:
        report_md = rpath[0].read_text()[:65000]  # GitHub issue limit

    # Fallback summary
    if not report_md:
        report_md = f"# Nova v5 — {now}\n**Target:** {target}\n**Critical:** {c} | **High:** {h}\n"
        for f in all_findings[:20]:
            sv   = str(f.get("severity","?")).upper()
            name = f.get("name", f.get("type","?"))
            report_md += f"\n- [{sv}] {name}"

    issue_body = {
        "title": f"[Nova v5] {target} — {c}C/{h}H/{m}M findings | {len(chains)} chains | {now}",
        "body":  report_md,
        "labels": ["nova-v5", "security", "automated", "bug-bounty"]
    }

    try:
        payload = json.dumps(issue_body).encode()
        req = urllib.request.Request(
            f"https://api.github.com/repos/{repo}/issues",
            data    = payload,
            headers = {
                "Authorization": f"Bearer {gh_tok}",
                "Accept":        "application/vnd.github+json",
                "Content-Type":  "application/json",
                "X-GitHub-Api-Version": "2022-11-28"
            },
            method = "POST"
        )
        with urllib.request.urlopen(req, timeout=30) as r:
            resp = json.loads(r.read())
            print(f"✅ GitHub Issue: #{resp.get('number')} → {resp.get('html_url','')}")
    except Exception as e:
        print(f"⚠️  GitHub Issue: {e}")

print(f"\n✅ Notifications complete")
print(f"   Summary: {c}C / {h}H / {m}M | {len(chains)} chains | {len(all_findings)} total")
NOTIFY

    # ═══════════════════════════════════════════════════════════════════════════
    # STEP 20 — UPLOAD ARTIFACTS
    # ═══════════════════════════════════════════════════════════════════════════
    - name: "📦 Step 20 — Upload Artifacts"
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: nova-v5-${{ github.run_id }}
        path: |
          /root/nova_workspace/reports/
          /root/nova_workspace/evidence/
          /root/nova_workspace/patches/
          /root/nova_workspace/graph/
          /root/nova_workspace/knowledge_graph.json
          /root/nova_workspace/attack_brief.txt
          /root/nova_workspace/validated_findings.json
          /root/nova_workspace/attack_chains.json
          /root/nova_workspace/hypotheses.json
        retention-days: 30
        if-no-files-found: warn
