        python3 << 'MEMLOAD'
import os, sys, json
from pathlib import Path
sys.path.insert(0, '.')
sys.path.insert(0, os.environ.get('NOVA_WORKSPACE', '/root/nova_workspace'))

target = os.environ.get("NOVA_TARGET", "")
ws     = os.environ.get("NOVA_WORKSPACE", "/root/nova_workspace")

# Try nova_memory.py
try:
    from nova_memory import NovaMemorySystem
    mem = NovaMemorySystem()
    mem.init_db()

    # Load previous findings for this target
    if target:
        prev = mem.get_target_findings(target, limit=50) if hasattr(mem, 'get_target_findings') else []
        session_id = mem.start_session(target) if hasattr(mem, 'start_session') else "v5-session"
        prev_count = len(prev) if prev else 0
        print(f"✅ Memory loaded: {prev_count} previous findings for {target}")
        if prev:
            print(f"   Recent critical: {[f.get('title','?') for f in prev if f.get('severity') in ('CRITICAL','HIGH')][:5]}")

        # Write memory context to file for use by later steps
        mem_ctx = {
            "target": target,
            "session_id": str(session_id),
            "previous_findings": prev,
            "loaded_at": __import__('datetime').datetime.utcnow().isoformat()
        }
        Path(ws + "/memory_context.json").write_text(json.dumps(mem_ctx, indent=2, default=str))
except Exception as e:
    print(f"ℹ️  Memory system: {e}")
    Path(os.environ.get('NOVA_WORKSPACE','/root/nova_workspace')+"/memory_context.json").write_text(
        json.dumps({"target": target, "previous_findings": [], "session_id": "v5"}, indent=2))

# Also try nova_findings_db.py
try:
    from nova_findings_db import NovaFindingsDatabase
    db = NovaFindingsDatabase(os.environ.get("NOVA_FINDINGS_DB", "/root/.nova/findings.db"))
    db.init() if hasattr(db, 'init') else None
    stats = db.stats() if hasattr(db, 'stats') else {}
    print(f"✅ Findings DB: {stats}")
except Exception as e:
    print(f"ℹ️  Findings DB: {e}")

# Load nova_brain_memory.json (self-improvement data from previous runs)
for brain_file in ["nova_brain_memory.json", "nova_memory.json", "nova_exploit_memory.json"]:
    if Path(brain_file).exists():
        try:
            data = json.loads(Path(brain_file).read_text())
            print(f"✅ Brain file {brain_file}: {list(data.keys())[:5]}")
        except: pass
MEMLOAD

