name: Nova Arsenal v5 — Total Dominance

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target URL (blank = rotate priority list)'
        required: false
        default: ''
      program:
        description: 'Bug bounty program name'
        required: false
        default: 'shopify'
      target_repo:
        description: 'Target GitHub repo (e.g. shopify/storefront) — blank = auto-discover'
        required: false
        default: ''
      model:
        description: 'LLM model (Ollama)'
        required: false
        default: 'qwen3:8b'
      engines:
        description: 'Engine set to run (all / web / network / chain / exploit)'
        required: false
        default: 'all'
      max_targets:
        description: 'Max targets per run'
        required: false
        default: '3'
      min_confidence:
        description: 'Min PoC confidence (0.0-1.0)'
        required: false
        default: '0.80'
      auto_exploit_live:
        description: 'Fire exploits live against target (true/false)'
        required: false
        default: 'false'
      enable_kali_kb:
        description: 'Load full Kali KB + auto-select tools (true/false)'
        required: false
        default: 'true'
      depth:
        description: 'Scan depth: fast / normal / deep'
        required: false
        default: 'normal'
  schedule:
    - cron: '0 2 * * *'

jobs:
  nova-v5:
    name: "🦅 Nova v5 — Full Arsenal + Knowledge Graph"
    runs-on: ubuntu-latest
    container:
      image: kalilinux/kali-last-release
      options: --privileged --shm-size=4g
    timeout-minutes: 350

    permissions:
      issues: write
      contents: read
      actions: read

    defaults:
      run:
        shell: bash

    env:
      NOVA_WORKSPACE:            /root/nova_workspace
      NOVA_TOOLS_DIR:            /opt/nova-tools
      NOVA_LLM_MODEL:            ${{ inputs.model || 'qwen3:8b' }}
      OPENAI_API_KEY:            ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY:         ${{ secrets.ANTHROPIC_API_KEY }}
      GOOGLE_API_KEY:            ${{ secrets.GOOGLE_API_KEY }}
      NOVA_MAX_STEPS:            100
      NOVA_ENGINES:              ${{ inputs.engines || 'all' }}
      NOVA_MAX_TARGETS:          ${{ inputs.max_targets || '3' }}
      NOVA_MIN_CONFIDENCE:       ${{ inputs.min_confidence || '0.80' }}
      NOVA_AUTO_EXPLOIT:         '1'
      NOVA_EXPLOIT_DRY:          ${{ (inputs.auto_exploit_live == 'true') && '0' || '1' }}
      NOVA_SCAN_DEPTH:           ${{ inputs.depth || 'normal' }}
      NOVA_ENABLE_KALI_KB:       ${{ inputs.enable_kali_kb || 'true' }}
      NOVA_TELEGRAM_TOKEN:       ${{ secrets.NOVA_TELEGRAM_TOKEN }}
      NOVA_TELEGRAM_CHAT_ID:     ${{ secrets.NOVA_TELEGRAM_CHAT_ID }}
      GITHUB_TOKEN:              ${{ secrets.GITHUB_TOKEN }}
      GITHUB_REPOSITORY:         ${{ github.repository }}
      GITHUB_RUN_ID:             ${{ github.run_id }}
      NOVA_GRAPH_PATH:           /root/nova_workspace/knowledge_graph.json
      NOVA_FINDINGS_DB:          /root/.nova/findings.db
      NOVA_MEMORY_DB:            /root/.nova/memory.db
      NVD_API_KEY:               ${{ secrets.NVD_API_KEY }}

    steps:

    # ═══════════════════════════════════════════════════════════════════════════
    # STEP 1 — ENVIRONMENT BOOTSTRAP
    # ═══════════════════════════════════════════════════════════════════════════
    - name: "⚙️ Step 1 — Environment Bootstrap"
      run: |
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "🦅 NOVA ARSENAL v5 — TOTAL DOMINANCE"
        echo "Run  : $GITHUB_RUN_ID"
        echo "Time : $(date -u +%Y-%m-%dT%H:%M:%SZ)"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

        export DEBIAN_FRONTEND=noninteractive
        apt-get update -qq 2>/dev/null | tail -1

        echo "[+] Installing system tools..."
        apt-get install -y -qq \
          python3 python3-pip python3-venv git curl wget jq \
          nmap masscan nikto gobuster dirb wfuzz sqlmap hydra \
          john hashcat medusa whatweb wafw00f dnsx subfinder \
          ffuf amass theHarvester recon-ng sslscan testssl.sh \
          metasploit-framework nuclei \
          chromium-driver firefox-esr \
          docker.io net-tools iputils-ping dnsutils whois \
          libssl-dev libffi-dev build-essential nodejs npm \
          2>/dev/null | tail -5

        echo "[+] Creating workspace directories..."
        mkdir -p $NOVA_WORKSPACE/{targets,reports,exploits,codebase,chains,evidence,patches,graph}
        mkdir -p $NOVA_TOOLS_DIR
        mkdir -p /root/.nova

        echo "[+] Upgrading pip + installing Python deps..."
        python3 -m pip install -q --upgrade pip setuptools wheel
        python3 -m pip install -q \
          requests urllib3 aiohttp httpx \
          openai anthropic google-generativeai \
          tree-sitter tree-sitter-javascript tree-sitter-python tree-sitter-go \
          gitpython PyGithub \
          playwright selenium \
          jwt cryptography \
          sqlite-utils sqlalchemy \
          rich tabulate colorama \
          beautifulsoup4 lxml \
          packaging semver \
          python-dotenv pyyaml \
          networkx \
          2>/dev/null | tail -5

        echo "[+] Installing Playwright browsers (headless)..."
        python3 -m playwright install chromium 2>/dev/null || true

        echo "[+] Checking Ollama availability..."
        if curl -sf http://localhost:11434/api/tags > /dev/null 2>&1; then
          echo "Ollama: running"
        else
          curl -sf https://ollama.ai/install.sh | sh 2>/dev/null &
          sleep 10
          ollama serve &>/tmp/ollama.log &
          sleep 15
          ollama pull ${NOVA_LLM_MODEL} 2>/dev/null &
          echo "Ollama: starting (background pull)"
        fi

        echo "✅ Environment ready"

    # ═══════════════════════════════════════════════════════════════════════════
    # STEP 2 — CHECKOUT + WIRE KNOWLEDGE GRAPH MODULE
    # ═══════════════════════════════════════════════════════════════════════════
    - name: "🕸️ Step 2 — Checkout Nova + Knowledge Graph Init"
      uses: actions/checkout@v4

    - name: "🕸️ Step 2b — Bootstrap Knowledge Graph"
      run: |
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "🕸️  NOVA KNOWLEDGE GRAPH — PentAGI-Style (Serverless)"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

        # Copy the knowledge graph module to workspace so all steps can import it
        cp nova_knowledge_graph.py $NOVA_WORKSPACE/ 2>/dev/null || python3 << 'KG_INLINE'
import sys, os
sys.path.insert(0, '.')
KG_INLINE

        python3 << 'KGINIT'
