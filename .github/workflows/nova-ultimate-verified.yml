import os, sys, json
from pathlib import Path
from datetime import datetime, timezone

sys.path.insert(0, '.')
sys.path.insert(0, os.environ.get('NOVA_WORKSPACE', '/root/nova_workspace'))

target = os.environ.get("NOVA_TARGET", "")
ws     = Path(os.environ.get("NOVA_WORKSPACE", "/root/nova_workspace"))

validated = json.loads((ws/"validated_findings.json").read_text()) if (ws/"validated_findings.json").exists() else []
hypos     = json.loads((ws/"hypotheses.json").read_text())          if (ws/"hypotheses.json").exists() else []
chains    = json.loads((ws/"attack_chains.json").read_text())       if (ws/"attack_chains.json").exists() else []

# ── A. NovaMemorySystem ────────────────────────────────────────────────────────
try:
    from nova_memory import NovaMemorySystem
    mem = NovaMemorySystem()
    mem.init_db() if hasattr(mem, 'init_db') else None

    # Store all validated findings
    for f in validated:
        if isinstance(f, dict) and f.get("title") or f.get("name"):
            try:
                mem.store_finding(f) if hasattr(mem,'store_finding') else \
                mem.add_finding(f)   if hasattr(mem,'add_finding')   else None
            except: pass

    # End session
    if hasattr(mem, 'end_session'):
        mem.end_session(
            findings_count = len(validated),
            tools_used     = ["hypothesis_engine","weapon_forge","chain_reasoner","daybreak","auto_exploit"],
            notes          = f"v5 run — {len(chains)} chains, {len(validated)} confirmed"
        )
    print(f"✅ Memory: {len(validated)} findings stored")
except Exception as e:
    print(f"ℹ️  MemorySystem: {e}")

# ── B. FindingsDatabase (SQLite) ───────────────────────────────────────────────
try:
    from nova_findings_db import NovaFindingsDatabase
    db = NovaFindingsDatabase(os.environ.get("NOVA_FINDINGS_DB","/root/.nova/findings.db"))
    if hasattr(db,'init'): db.init()
    for f in validated:
        try:
            db.store(f) if hasattr(db,'store') else db.add(f) if hasattr(db,'add') else None
        except: pass
    print(f"✅ FindingsDB: {len(validated)} findings persisted")
except Exception as e:
    print(f"ℹ️  FindingsDB: {e}")

# ── C. Nova Self-Improvement (update brain memory) ────────────────────────────
try:
    from nova_self_improvement import NovaSelfImprovement
    si = NovaSelfImprovement()
    feedback = {
        "run_id":        os.environ.get("GITHUB_RUN_ID",""),
        "target":        target,
        "findings":      len(validated),
        "chains":        len(chains),
        "confirmed_high": sum(1 for f in validated if str(f.get("severity","")).upper() in ("CRITICAL","HIGH")),
        "timestamp":     datetime.now(timezone.utc).isoformat(),
    }
    si.update(feedback) if hasattr(si,'update') else \
    si.learn(feedback)  if hasattr(si,'learn')  else None
    print(f"✅ Self-Improvement: brain updated with run feedback")
except Exception as e:
    print(f"ℹ️  SelfImprovement: {e}")

# ── D. Update nova_brain_memory.json ──────────────────────────────────────────
brain_file = Path("nova_brain_memory.json")
try:
    brain = json.loads(brain_file.read_text()) if brain_file.exists() else {}
    brain.setdefault("runs", [])
    brain["runs"].append({
        "run_id":    os.environ.get("GITHUB_RUN_ID",""),
        "target":    target,
        "findings":  len(validated),
        "chains":    len(chains),
        "timestamp": datetime.now(timezone.utc).isoformat(),
    })
    # Keep only last 50 runs
    brain["runs"] = brain["runs"][-50:]
    brain["total_findings"] = brain.get("total_findings", 0) + len(validated)
    brain["last_run"]       = datetime.now(timezone.utc).isoformat()
    brain_file.write_text(json.dumps(brain, indent=2))
    print(f"✅ Brain memory: total_findings={brain['total_findings']}")
except Exception as e:
    print(f"ℹ️  Brain memory: {e}")
