    - name: "📚 Step 5 — Codebase Intelligence: Strategic Map"
      run: |
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "📚  CODEBASE INTELLIGENCE PHASE"
        echo "    Reading target source BEFORE scanning (Nova-only capability)"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

        python3 << 'CODEBASE'
import os, sys, json, subprocess
from pathlib import Path

sys.path.insert(0, '.')
sys.path.insert(0, os.environ.get('NOVA_WORKSPACE', '/root/nova_workspace'))

target      = os.environ.get("NOVA_TARGET", "")
ws          = Path(os.environ.get("NOVA_WORKSPACE", "/root/nova_workspace"))
target_repo = os.environ.get("INPUT_TARGET_REPO", "").strip()
gh_token    = os.environ.get("GITHUB_TOKEN", "")
program     = os.environ.get("NOVA_PROGRAM", "")

codebase_dir = ws / "codebase"
findings_map = {}
attack_brief = ""

# ── A. Auto-discover or use provided GitHub repo ──────────────────────────────
repo_url = None
if target_repo:
    repo_url = f"https://github.com/{target_repo}"
    print(f"[+] Using provided repo: {repo_url}")
elif target and gh_token:
    print(f"[+] Auto-discovering GitHub repo for: {target}")
    try:
        from nova_github_scanner import NovaGitHubScanner
        scanner = NovaGitHubScanner(gh_token)
        from urllib.parse import urlparse
        domain = urlparse(target).netloc.replace("www.", "")
        org    = domain.split(".")[0]
        found  = scanner.find_repo_for_domain(domain) if hasattr(scanner, 'find_repo_for_domain') else None
        if found:
            repo_url = found
            print(f"   ✅ Discovered: {repo_url}")
        else:
            print(f"   ℹ️  No public repo found for {domain}")
    except Exception as e:
        print(f"   ℹ️  GitHub auto-discovery: {e}")

# ── B. Clone repo shallowly ───────────────────────────────────────────────────
cloned_path = None
if repo_url:
    safe_name = repo_url.replace("https://github.com/", "").replace("/", "_")
    clone_dir = codebase_dir / safe_name
    try:
        if not clone_dir.exists():
            print(f"[+] Cloning {repo_url} (shallow)...")
            cmd = ["git", "clone", "--depth=1", "--filter=blob:none",
                   "--no-checkout", repo_url, str(clone_dir)]
            if gh_token:
                auth_url = repo_url.replace("https://", f"https://oauth2:{gh_token}@")
                cmd = ["git", "clone", "--depth=1", auth_url, str(clone_dir)]
            result = subprocess.run(cmd, capture_output=True, text=True, timeout=120)
            if result.returncode == 0:
                # Sparse checkout source files only
                subprocess.run(["git", "-C", str(clone_dir), "sparse-checkout", "init", "--cone"],
                               capture_output=True, timeout=30)
                subprocess.run(["git", "-C", str(clone_dir), "checkout"],
                               capture_output=True, timeout=120)
                cloned_path = str(clone_dir)
                print(f"   ✅ Cloned to {clone_dir}")
            else:
                print(f"   ⚠️  Clone failed: {result.stderr[:200]}")
        else:
            cloned_path = str(clone_dir)
            print(f"   ✅ Using cached clone: {clone_dir}")
    except Exception as e:
        print(f"   ⚠️  Clone error: {e}")

# Fall back to the checked-out repo itself
if not cloned_path:
    cloned_path = "."
    print(f"[+] Using checked-out repo as codebase source")

# ── C. NovaCodebaseMapper ─────────────────────────────────────────────────────
codebase_map = None
try:
    print(f"\n[C] 🗺️  NovaCodebaseMapper...")
    from nova_codebase_mapper import NovaCodebaseMapper, map_to_agent_context
    mapper = NovaCodebaseMapper(cloned_path)
    codebase_map = mapper.scan()
    brief = mapper.attack_brief()
    attack_brief += brief + "\n\n"
    findings_map["codebase_mapper"] = {
        "endpoints":    len(codebase_map.endpoints)    if hasattr(codebase_map,"endpoints") else 0,
        "auth_patterns":len(codebase_map.auth_patterns) if hasattr(codebase_map,"auth_patterns") else 0,
        "dependencies": len(codebase_map.dependencies) if hasattr(codebase_map,"dependencies") else 0,
        "secrets":      len(codebase_map.secrets)       if hasattr(codebase_map,"secrets") else 0,
        "brief_len":    len(brief),
    }
    print(f"   ✅ Mapper: {findings_map['codebase_mapper']}")
except Exception as e:
    print(f"   ⚠️  CodebaseMapper: {e}")

# ── D. NovaASTIntel ───────────────────────────────────────────────────────────
ast_results = {}
try:
    print(f"\n[D] 🌲 NovaASTIntel (route→handler→sink graph)...")
    from nova_ast_intel import NovaASTIntel
    ast = NovaASTIntel(cloned_path)
    ast_result = ast.analyse()
    taint_flows = ast.get_taint_flows() if hasattr(ast, 'get_taint_flows') else []
    routes      = ast.get_routes()      if hasattr(ast, 'get_routes')      else []
    sinks       = ast.get_sinks()       if hasattr(ast, 'get_sinks')       else []

    attack_brief += f"\n### AST Intel\nRoutes: {len(routes)} | Taint flows: {len(taint_flows)} | Sinks: {len(sinks)}\n"
    if taint_flows:
        attack_brief += "Taint paths found:\n"
        for tf in taint_flows[:10]:
            attack_brief += f"  • {tf}\n"

    ast_results = {"routes": len(routes), "taint_flows": len(taint_flows), "sinks": len(sinks)}
    findings_map["ast_intel"] = ast_results
    print(f"   ✅ AST: {ast_results}")
except Exception as e:
    print(f"   ⚠️  ASTIntel: {e}")

# ── E. NovaSourceAuditor ──────────────────────────────────────────────────────
source_audit = {}
try:
    print(f"\n[E] 🔍 NovaSourceAuditor (taint tracing + sink detection)...")
    from nova_source_auditor import NovaSourceAuditor
    auditor = NovaSourceAuditor(cloned_path)
    audit_results = auditor.run_audit() if hasattr(auditor, 'run_audit') else auditor.scan_directory(cloned_path)
    prioritized   = auditor.prioritize_files() if hasattr(auditor, 'prioritize_files') else []

    source_audit = {
        "findings": len(audit_results) if audit_results else 0,
        "priority_files": len(prioritized),
    }
    findings_map["source_auditor"] = source_audit
    print(f"   ✅ Source Audit: {source_audit}")

    if audit_results:
        attack_brief += "\n### Source Audit Findings\n"
        for f in (audit_results[:15] if isinstance(audit_results, list) else []):
            if isinstance(f, dict):
                attack_brief += f"  • [{f.get('severity','?')}] {f.get('type','?')} in {f.get('file','?')}:{f.get('line','?')}\n"
except Exception as e:
    print(f"   ⚠️  SourceAuditor: {e}")

# ── F. NovaRepoIntelligence ───────────────────────────────────────────────────
try:
    print(f"\n[F] 📖 Nova Repo Intelligence (symbol index)...")
    from nova_repo_intelligence import build_repo_index, save_repo_index, query_repo_index
    idx = build_repo_index(cloned_path)
    if idx:
        idx_path = ws / "repo_index.json"
        save_repo_index(idx, str(idx_path))
        findings_map["repo_index"] = {
            "functions": len(idx.get("functions", [])),
            "classes":   len(idx.get("classes", [])),
            "routes":    len(idx.get("routes", [])),
        }
        print(f"   ✅ Repo Index: {findings_map['repo_index']}")
except Exception as e:
    print(f"   ⚠️  RepoIntelligence: {e}")

# ── G. NovaSCAScanner (Software Composition Analysis) ────────────────────────
sca_findings = []
try:
    print(f"\n[G] 📦 NovaSCAScanner (vulnerable dependencies)...")
    from nova_sca_scanner import NovaSCAScanner
    sca = NovaSCAScanner(use_osv=True)
    sca_findings = sca.scan_directory(cloned_path)
    findings_map["sca_scanner"] = {
        "findings":  len(sca_findings),
        "critical":  sum(1 for f in sca_findings if f.get("severity") == "CRITICAL"),
