validated = json.loads((ws/"validated_findings.json").read_text()) if (ws/"validated_findings.json").exists() else []
hypos     = json.loads((ws/"hypotheses.json").read_text())          if (ws/"hypotheses.json").exists() else []
chains    = json.loads((ws/"attack_chains.json").read_text())       if (ws/"attack_chains.json").exists() else []
brief     = (ws/"attack_brief.txt").read_text()                     if (ws/"attack_brief.txt").exists() else ""
codebase  = json.loads((ws/"codebase_findings.json").read_text())   if (ws/"codebase_findings.json").exists() else {}
engine_r  = json.loads((ws/"engine_results.json").read_text())      if (ws/"engine_results.json").exists() else {}
patches   = json.loads((ws/"patches/patches.json").read_text())     if (ws/"patches/patches.json").exists() else []
kg_md     = (ws/"graph/knowledge_graph.md").read_text()             if (ws/"graph/knowledge_graph.md").exists() else ""

def sev(findings):
    c = sum(1 for f in findings if str(f.get("severity","")).upper()=="CRITICAL")
    h = sum(1 for f in findings if str(f.get("severity","")).upper()=="HIGH")
    m = sum(1 for f in findings if str(f.get("severity","")).upper()=="MEDIUM")
    l = sum(1 for f in findings if str(f.get("severity","")).upper()=="LOW")
    return c, h, m, l

all_findings = validated if validated else [h for h in hypos if h.get("confidence",0)>=0.60]
c, h, m, l   = sev(all_findings)
now          = datetime.now(timezone.utc).strftime("%Y-%m-%d %H:%M UTC")

# ── Markdown Report ────────────────────────────────────────────────────────────
md = f"""# 🦅 Nova Arsenal v5 — Security Assessment Report

**Target:** {target}
**Program:** {program}
**Run ID:** {run_id}
**Generated:** {now}

---

## Executive Summary

| Severity | Count |
|----------|-------|
| 🔴 Critical | {c} |
| 🟠 High | {h} |
| 🟡 Medium | {m} |
| 🔵 Low | {l} |
| **Total** | **{len(all_findings)}** |

**Attack Chains:** {len(chains)}
**Patches Generated:** {len(patches)}

---

## 📚 Codebase Intelligence (Pre-Scan)

Nova read the target's source code BEFORE scanning.

| Module | Result |
|--------|--------|
| CodebaseMapper | {codebase.get("codebase_mapper",{}).get("endpoints",0)} endpoints found |
| ASTIntel | {codebase.get("ast_intel",{}).get("taint_flows",0)} taint flows traced |
| SourceAuditor | {codebase.get("source_auditor",{}).get("findings",0)} sink findings |
| SCA Scanner | {codebase.get("sca_scanner",{}).get("findings",0)} vulnerable deps |
| ZeroDay Correlator | {codebase.get("zero_day_correlator",{}).get("correlations",0)} CVE correlations |
| Boosted Priors | {len(codebase.get("boosted_priors",{}))} hypotheses pre-seeded |

{kg_md}

---

## 🔗 Attack Chains

"""

for i, ch in enumerate(chains[:10], 1):
    if isinstance(ch, dict):
        ct   = ch.get("chain_type","?")
        sev_ = ch.get("severity","?")
        narr = ch.get("narrative","")[:200]
        steps= ch.get("steps",[])
        md  += f"### Chain {i}: {ct} [{sev_}]\n\n{narr}\n\n"
        if steps:
            for s in steps[:5]:
                md += f"- {s}\n"
        md += "\n"

md += "---\n\n## 🔴 Critical & High Findings\n\n"

for f in sorted(all_findings, key=lambda x: {"CRITICAL":0,"HIGH":1,"MEDIUM":2,"LOW":3}.get(str(x.get("severity","")).upper(),4))[:25]:
    sv   = str(f.get("severity","MEDIUM")).upper()
    icon = {"CRITICAL":"🔴","HIGH":"🟠","MEDIUM":"🟡","LOW":"🔵"}.get(sv,"⚪")
    name = f.get("name", f.get("type", f.get("title","Unknown")))
    url  = f.get("url", f.get("endpoint","")) or target
    conf = f.get("confidence", 0)
    src  = "📁" if f.get("source","")=="hypothesis_engine" else "🌐"
    md  += f"#### {icon} [{sv}] {name}\n\n"
    md  += f"- **URL:** `{url}`\n"
    md  += f"- **Confidence:** {conf:.0%}\n"
    md  += f"- **Source:** {src} {f.get('source','?')}\n"
