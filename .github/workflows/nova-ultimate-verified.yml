ws      = Path(os.environ.get("NOVA_WORKSPACE", "/root/nova_workspace"))

from nova_knowledge_graph import NovaKnowledgeGraph, NodeType, EdgeType

kg = NovaKnowledgeGraph()

# 1. Add target node
target_id = kg.add_target(target, {"program": os.environ.get("NOVA_PROGRAM",""),
                                    "run_id":  os.environ.get("GITHUB_RUN_ID","")})

# 2. Add endpoints from behavioral profiling
profiles = json.loads((ws/"behavioral_profiles.json").read_text()) if (ws/"behavioral_profiles.json").exists() else []
ep_ids   = {}
for p in profiles:
    ep_path = p.get("endpoint","")
    if ep_path:
        ep_id = kg.add_endpoint(target_id, ep_path, properties={
            "attack_surface": p.get("attack_surface_rating","?"),
            "behavior":       list(p.get("behavior",{}).keys()),
        })
        ep_ids[ep_path] = ep_id

# 3. Add techniques from Kali KB plan
tool_plan = json.loads((ws/"tool_plan.json").read_text()) if (ws/"tool_plan.json").exists() else []
for tp in tool_plan:
    kg.add_technique(tp.get("for_vuln","?"), tp.get("tool",""), confidence=0.6)

# 4. Add all findings
hypos = json.loads((ws/"hypotheses.json").read_text()) if (ws/"hypotheses.json").exists() else []
finding_ids = {}
for h in hypos:
    fid = kg.add_finding(target_id, {
        "name":       h.get("name", h.get("type","")),
        "type":       h.get("name", h.get("type","")),
        "severity":   h.get("severity","MEDIUM"),
        "confidence": h.get("confidence", 0),
        "url":        h.get("url","") or target,
        "parameter":  h.get("parameter",""),
        "confirmed":  h.get("confirmed", False),
        "source":     "hypothesis_engine",
    })
    finding_ids[h.get("id","")] = fid

# 5. Add engine findings
engine_r = json.loads((ws/"engine_results.json").read_text()) if (ws/"engine_results.json").exists() else {}
for eng_name, result in engine_r.items():
    if isinstance(result, dict) and "error" not in result:
        findings = result.get("findings", result.get("results", []))
        if isinstance(findings, list):
            for f in findings:
                if isinstance(f, dict):
                    kg.add_finding(target_id, {**f, "source": eng_name})

# 6. Add attack chains
chains = json.loads((ws/"attack_chains.json").read_text()) if (ws/"attack_chains.json").exists() else []
for ch in chains:
