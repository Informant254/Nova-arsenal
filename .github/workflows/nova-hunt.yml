name: Nova Arsenal Hunt

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target domain (leave empty → uses targets_priority.txt)'
        required: false
        default: ''
      model:
        description: 'Ollama model'
        required: false
        default: 'llama3.1:8b'
        type: choice
        options:
          - llama3.1:8b
          - qwen2.5:7b
          - deepseek-r1:7b
          - mistral:7b
          - llama3.1:70b
      mission:
        description: 'Mission type'
        required: false
        default: 'full'
        type: choice
        options:
          - full
          - recon
          - exploit
          - triage
  schedule:
    - cron: '0 3 * * 1'

permissions:
  issues: write
  contents: write

jobs:
  nova-hunt:
    name: Nova Hunt (Kali + Ollama)
    runs-on: ubuntu-latest
    container:
      image: kalilinux/kali-last-release
      options: --privileged --user root

    timeout-minutes: 300

    steps:
      - name: Bootstrap Kali environment
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update -qq
          apt-get install -y -qq \
            python3 python3-pip python3-venv \
            curl wget git nmap \
            subfinder httpx-toolkit nuclei \
            sqlmap ffuf gobuster \
            amass nikto whatweb \
            dnsutils whois netcat-openbsd \
            build-essential libssl-dev \
            chromium chromium-driver \
            2>/dev/null || true
          echo "Kali tools ready"

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: nova-kali-pip-${{ hashFiles('requirements-ci.txt') }}
          restore-keys: nova-kali-pip-

      - name: Install Python dependencies
        run: |
          pip3 install --quiet --break-system-packages -r requirements-ci.txt || \
          pip3 install --quiet -r requirements-ci.txt || true
          pip3 install --quiet --break-system-packages playwright || true
          python3 -m playwright install chromium 2>/dev/null || true

      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.ai/install.sh | sh
          ollama serve > /tmp/ollama.log 2>&1 &
          echo "Waiting for Ollama..."
          for i in $(seq 1 40); do
            curl -s http://localhost:11434/api/tags > /dev/null 2>&1 && echo "Ollama ready!" && break
            sleep 3
          done

      - name: Cache Ollama model
        id: ollama-cache
        uses: actions/cache@v4
        with:
          path: ~/.ollama
          key: ollama-kali-${{ inputs.model || 'llama3.1:8b' }}

      - name: Pull Ollama model
        run: |
          MODEL="${{ inputs.model }}"
          if [ -z "$MODEL" ]; then MODEL="llama3.1:8b"; fi
          echo "Pulling $MODEL..."
          ollama pull "$MODEL"
          ollama list

      - name: Resolve target
        id: target
        run: |
          TARGET="${{ inputs.target }}"
          if [ -z "$TARGET" ]; then
            TARGET=$(grep -v '^#' targets_priority.txt | grep -v '^$' | head -1)
          fi
          # Ensure https prefix
          if [[ "$TARGET" != http* ]]; then
            TARGET="https://$TARGET"
          fi
          echo "target=$TARGET" >> $GITHUB_OUTPUT
          echo "Nova will hunt: $TARGET"

      - name: Set up Nova workspace
        run: |
          mkdir -p ~/nova_workspace/{reports,logs,wordlists,memory,screenshots,tools,bin}
          # Pre-load wordlists
          curl -sL "https://raw.githubusercontent.com/danielmiessler/SecLists/master/Discovery/Web-Content/common.txt" \
            -o ~/nova_workspace/wordlists/common.txt 2>/dev/null || true

      - name: Announce hunt start via Telegram
        env:
          NOVA_TELEGRAM_TOKEN: ${{ secrets.NOVA_TELEGRAM_TOKEN }}
          NOVA_TELEGRAM_CHAT_ID: ${{ secrets.NOVA_TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$NOVA_TELEGRAM_TOKEN" ] && [ -n "$NOVA_TELEGRAM_CHAT_ID" ]; then
            TARGET="${{ steps.target.outputs.target }}"
            MODEL="${{ inputs.model }}"
            if [ -z "$MODEL" ]; then MODEL="llama3.1:8b"; fi
            MSG="🦅 *Nova Hunt Started*%0A%0ATarget: \`$TARGET\`%0AModel: \`$MODEL\`%0ATime: $(date -u '+%Y-%m-%d %H:%M UTC')"
            curl -s "https://api.telegram.org/bot${NOVA_TELEGRAM_TOKEN}/sendMessage" \
              -d "chat_id=${NOVA_TELEGRAM_CHAT_ID}&text=${MSG}&parse_mode=Markdown" > /dev/null
          fi

      - name: Run Nova Arsenal (autonomous)
        id: nova
        env:
          NOVA_LLM_URL: http://localhost:11434
          NOVA_LLM_MODEL: ${{ inputs.model || 'llama3.1:8b' }}
          NOVA_MAX_STEPS: '80'
          NOVA_TELEGRAM_TOKEN: ${{ secrets.NOVA_TELEGRAM_TOKEN }}
          NOVA_TELEGRAM_CHAT_ID: ${{ secrets.NOVA_TELEGRAM_CHAT_ID }}
          DISPLAY: ':99'
        run: |
          MODEL="${NOVA_LLM_MODEL}"
          if [ -z "$MODEL" ]; then MODEL="llama3.1:8b"; fi
          export NOVA_LLM_MODEL="$MODEL"

          TARGET="${{ steps.target.outputs.target }}"
          MISSION="${{ inputs.mission }}"
          if [ -z "$MISSION" ]; then MISSION="full"; fi

          echo "============================================"
          echo " Nova Arsenal — Kali + Ollama ($MODEL)"
          echo " Target : $TARGET"
          echo " Mission: $MISSION"
          echo " Steps  : $NOVA_MAX_STEPS"
          echo "============================================"

          case "$MISSION" in
            recon)
              CMD="Perform full reconnaissance on $TARGET: subdomains, live hosts, endpoints, JS analysis, secrets in JS, open ports, tech stack, cloud assets"
              ;;
            exploit)
              CMD="Run full vulnerability discovery and exploitation on $TARGET: SQLi, XSS, SSRF, IDOR, JWT attacks, prototype pollution, auth bypass, RCE — verify all findings"
              ;;
            triage)
              CMD="Triage all existing findings for $TARGET, CVSS score them, generate H1-ready bug report for top 3 findings"
              ;;
            *)
              CMD="Full autonomous security assessment on $TARGET: recon → vuln discovery → exploitation → triage → H1-ready report. Use all available tools. Write custom scripts if needed. Maximum coverage."
              ;;
          esac

          timeout 270 python3 nova.py "$CMD" 2>&1 | tee nova_run.log || echo "Nova run ended (timeout or completion)"

      - name: Collect and format findings
        id: findings
        run: |
          LINES=$(wc -l < nova_run.log)
          echo "lines=$LINES" >> $GITHUB_OUTPUT
          # Extract finding summaries
          grep -i "finding\|vuln\|critical\|high\|medium\|CVE\|SSRF\|SQLi\|XSS\|RCE\|IDOR\|bypass" nova_run.log | tail -100 > findings_summary.txt || true
          SUMMARY_LINES=$(wc -l < findings_summary.txt)
          echo "summary_lines=$SUMMARY_LINES" >> $GITHUB_OUTPUT
          tail -c 65000 nova_run.log > nova_trimmed.log

      - name: Post findings as GitHub Issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const log = fs.readFileSync('nova_trimmed.log', 'utf8');
            const summary = fs.existsSync('findings_summary.txt')
              ? fs.readFileSync('findings_summary.txt', 'utf8')
              : '';
            const date = new Date().toISOString().split('T')[0];
            const target = '${{ steps.target.outputs.target }}';
            const model = '${{ inputs.model }}' || 'llama3.1:8b';
            const mission = '${{ inputs.mission }}' || 'full';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const body = `## Nova Arsenal Hunt Results

**Target:** \`${target}\`
**Model:** \`${model}\` (Ollama — local, no API cost)
**Mission:** \`${mission}\`
**Date:** ${date}
**Run:** [View full logs + artifacts](${runUrl})

---

${summary ? `### Key Findings Detected\n\`\`\`\n${summary.slice(0, 3000)}\n\`\`\`` : '_No keyword matches in log — see full output below._'}

---

<details>
<summary>Full Nova Output (click to expand)</summary>

\`\`\`
${log}
\`\`\`

</details>
`;

            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Nova Hunt: ${target} [${date}] — ${mission}`,
              body,
              labels: ['nova-findings', 'automated']
            });

            core.setOutput('issue_url', issue.data.html_url);
            console.log('Issue created:', issue.data.html_url);

      - name: Notify completion via Telegram
        if: always()
        env:
          NOVA_TELEGRAM_TOKEN: ${{ secrets.NOVA_TELEGRAM_TOKEN }}
          NOVA_TELEGRAM_CHAT_ID: ${{ secrets.NOVA_TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$NOVA_TELEGRAM_TOKEN" ] && [ -n "$NOVA_TELEGRAM_CHAT_ID" ]; then
            TARGET="${{ steps.target.outputs.target }}"
            LINES="${{ steps.findings.outputs.lines }}"
            STATUS="${{ job.status }}"
            EMOJI="✅"
            if [ "$STATUS" != "success" ]; then EMOJI="⚠️"; fi
            MSG="${EMOJI} *Nova Hunt Complete*%0A%0ATarget: \`$TARGET\`%0ALog lines: ${LINES}%0AStatus: ${STATUS}%0AFindings in Issues tab"
            curl -s "https://api.telegram.org/bot${NOVA_TELEGRAM_TOKEN}/sendMessage" \
              -d "chat_id=${NOVA_TELEGRAM_CHAT_ID}&text=${MSG}&parse_mode=Markdown" > /dev/null
          fi

      - name: Upload full log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nova-kali-log-${{ github.run_id }}
          path: |
            nova_run.log
            findings_summary.txt
          retention-days: 90
