name: Nova Arsenal Hunt

on:
  workflow_dispatch:
    inputs:
      target:
        description: Target domain
        required: false
        default: testphp.vulnweb.com
      model:
        description: Ollama model
        required: false
        default: llama3.1:8b
      steps:
        description: Max steps per mode
        required: false
        default: '40'
  schedule:
    - cron: '0 3 * * 1'

permissions:
  issues: write
  contents: write

jobs:
  nova-hunt:
    name: Nova Full Arsenal
    runs-on: ubuntu-latest
    container:
      image: kalilinux/kali-last-release
      options: --privileged --user root
    timeout-minutes: 330
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Test trigger works
        run: echo Workflow trigger confirmed
