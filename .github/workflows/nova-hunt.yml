name: Nova Arsenal Hunt

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target domain (empty = uses targets_priority.txt)'
        required: false
        default: ''
      model:
        description: 'Ollama model'
        required: false
        default: 'llama3.1:8b'
        type: choice
        options:
          - llama3.1:8b
          - qwen2.5:7b
          - deepseek-r1:7b
          - mistral:7b
      steps:
        description: 'Max agent steps per mode'
        required: false
        default: '40'
  schedule:
    - cron: '0 3 * * 1'

permissions:
  issues: write
  contents: write

jobs:
  nova-hunt:
    name: Nova Full Arsenal (Kali + Ollama)
    runs-on: ubuntu-latest
    container:
      image: kalilinux/kali-last-release
      options: --privileged --user root

    timeout-minutes: 330

    steps:
      # ── 1. BOOTSTRAP KALI ────────────────────────────────────────────────────
      - name: Bootstrap Kali + full tool stack
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update -qq 2>/dev/null

          echo "Installing core tools..."
          apt-get install -y -qq \
            python3 python3-pip python3-dev python3-venv \
            curl wget git ca-certificates gnupg \
            build-essential libssl-dev libffi-dev \
            2>/dev/null || true

          echo "Installing recon tools..."
          apt-get install -y -qq \
            nmap masscan \
            dnsutils whois dnsrecon dnsenum \
            theharvester amass sublist3r recon-ng \
            2>/dev/null || true

          echo "Installing web attack tools..."
          apt-get install -y -qq \
            nikto whatweb wafw00f \
            sqlmap \
            gobuster dirb \
            2>/dev/null || true

          echo "Installing network tools..."
          apt-get install -y -qq \
            netcat-openbsd \
            tcpdump net-tools \
            hydra medusa \
            2>/dev/null || true

          echo "Installing extra web tools..."
          apt-get install -y -qq \
            chromium chromium-driver \
            2>/dev/null || true

          echo "Installing Go tools..."
          apt-get install -y -qq golang-go 2>/dev/null || true
          export GOPATH=/root/go
          export PATH=$PATH:/root/go/bin:/usr/local/go/bin

          # ffuf — fast fuzzer
          go install github.com/ffuf/ffuf/v2@latest 2>/dev/null || \
            apt-get install -y -qq ffuf 2>/dev/null || true

          # subfinder
          go install -v github.com/projectdiscovery/subfinder/v2/cmd/subfinder@latest 2>/dev/null || \
            apt-get install -y -qq subfinder 2>/dev/null || true

          # httpx
          go install -v github.com/projectdiscovery/httpx/cmd/httpx@latest 2>/dev/null || \
            apt-get install -y -qq httpx-toolkit 2>/dev/null || true

          # nuclei
          go install -v github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest 2>/dev/null || \
            apt-get install -y -qq nuclei 2>/dev/null || true

          # katana crawler
          go install github.com/projectdiscovery/katana/cmd/katana@latest 2>/dev/null || true

          # gau (get all URLs)
          go install github.com/lc/gau/v2/cmd/gau@latest 2>/dev/null || true

          # waybackurls
          go install github.com/tomnomnom/waybackurls@latest 2>/dev/null || true

          # dalfox (XSS)
          go install github.com/hahwul/dalfox/v2@latest 2>/dev/null || true

          # arjun (param discovery) via pip
          pip3 install --quiet --break-system-packages arjun 2>/dev/null || true

          echo "✅ Kali tool stack installed"
          which nmap sqlmap nikto gobuster || true

      # ── 2. CHECKOUT ───────────────────────────────────────────────────────────
      - name: Checkout Nova Arsenal
        uses: actions/checkout@v4

      # ── 3. PYTHON DEPS ────────────────────────────────────────────────────────
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: nova-v3-pip-${{ hashFiles('requirements-ci.txt') }}
          restore-keys: nova-v3-pip-

      - name: Install Python dependencies
        run: |
          pip3 install --quiet --break-system-packages -r requirements-ci.txt 2>/dev/null || \
          pip3 install --quiet -r requirements-ci.txt || true
          python3 -m playwright install chromium --with-deps 2>/dev/null || true

      # ── 4. WORDLISTS ──────────────────────────────────────────────────────────
      - name: Download wordlists
        run: |
          mkdir -p ~/nova_workspace/wordlists
          curl -sL "https://raw.githubusercontent.com/danielmiessler/SecLists/master/Discovery/Web-Content/common.txt" \
            -o ~/nova_workspace/wordlists/common.txt 2>/dev/null || true
          curl -sL "https://raw.githubusercontent.com/danielmiessler/SecLists/master/Discovery/Web-Content/raft-medium-directories.txt" \
            -o ~/nova_workspace/wordlists/dirs.txt 2>/dev/null || true
          curl -sL "https://raw.githubusercontent.com/danielmiessler/SecLists/master/Discovery/DNS/subdomains-top1million-20000.txt" \
            -o ~/nova_workspace/wordlists/subdomains.txt 2>/dev/null || true
          echo "Wordlists ready: $(ls ~/nova_workspace/wordlists/)"

      # ── 5. OLLAMA ─────────────────────────────────────────────────────────────
      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.ai/install.sh | sh
          ollama serve > /tmp/ollama.log 2>&1 &
          echo "Waiting for Ollama..."
          for i in $(seq 1 40); do
            curl -s http://localhost:11434/api/tags > /dev/null 2>&1 && echo "Ollama ready" && break
            sleep 3
          done

      - name: Cache Ollama model
        uses: actions/cache@v4
        with:
          path: ~/.ollama
          key: ollama-v3-${{ inputs.model || 'llama3.1:8b' }}

      - name: Pull Ollama model
        run: |
          MODEL="${{ inputs.model }}"
          if [ -z "$MODEL" ]; then MODEL="llama3.1:8b"; fi
          echo "Pulling $MODEL..."
          ollama pull "$MODEL"
          ollama list

      # ── 6. RESOLVE TARGET ─────────────────────────────────────────────────────
      - name: Resolve target
        id: target
        run: |
          TARGET="${{ inputs.target }}"
          if [ -z "$TARGET" ]; then
            TARGET=$(grep -v '^#' targets_priority.txt | grep -v '^$' | head -1)
          fi
          if [[ "$TARGET" != http* ]]; then
            TARGET="https://$TARGET"
          fi
          echo "target=$TARGET" >> $GITHUB_OUTPUT
          echo "Hunting: $TARGET"

      # ── 7. TELEGRAM: HUNT START ───────────────────────────────────────────────
      - name: Notify hunt start
        env:
          NOVA_TELEGRAM_TOKEN: ${{ secrets.NOVA_TELEGRAM_TOKEN }}
          NOVA_TELEGRAM_CHAT_ID: ${{ secrets.NOVA_TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$NOVA_TELEGRAM_TOKEN" ] && [ -n "$NOVA_TELEGRAM_CHAT_ID" ]; then
            MODEL="${{ inputs.model }}"; if [ -z "$MODEL" ]; then MODEL="llama3.1:8b"; fi
            MSG="🦅 *Nova Arsenal — Full Hunt Started*%0A%0ATarget: \`${{ steps.target.outputs.target }}\`%0AModel: \`$MODEL\`%0AModes: ALL (recon → full_stack → hunt → SQLi → SSRF → JWT → proto → race → LLM inject → zero-day → orchestrate → swarm → pipeline → nextgen → kali → daybreak → sandbox → triage → report)%0ATime: $(date -u '+%Y-%m-%d %H:%M UTC')"
            curl -s "https://api.telegram.org/bot${NOVA_TELEGRAM_TOKEN}/sendMessage" \
              -d "chat_id=${NOVA_TELEGRAM_CHAT_ID}&text=${MSG}&parse_mode=Markdown" > /dev/null || true
          fi

      # ── 8. RUN NOVA — ALL MODULES ─────────────────────────────────────────────
      - name: Run Nova CI Runner (all modules)
        id: nova
        env:
          NOVA_LLM_URL: http://localhost:11434
          NOVA_LLM_MODEL: ${{ inputs.model || 'llama3.1:8b' }}
          NOVA_MAX_STEPS: ${{ inputs.steps || '40' }}
          NOVA_TELEGRAM_TOKEN: ${{ secrets.NOVA_TELEGRAM_TOKEN }}
          NOVA_TELEGRAM_CHAT_ID: ${{ secrets.NOVA_TELEGRAM_CHAT_ID }}
          NOVA_WORKSPACE: /root/nova_workspace
          NOVA_CI_MODE: '1'
          NOVA_TOOL_CLONE_DIR: /opt/nova-tools
          GOPATH: /root/go
          PATH: /root/go/bin:/usr/local/go/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
          DISPLAY: ':99'
        run: |
          MODEL="${NOVA_LLM_MODEL}"; if [ -z "$MODEL" ]; then MODEL="llama3.1:8b"; fi
          export NOVA_LLM_MODEL="$MODEL"
          mkdir -p /root/nova_workspace

          TARGET="${{ steps.target.outputs.target }}"
          echo "Starting Nova CI Runner — ALL modules — target: $TARGET"
          echo "Model: $MODEL | Max steps per mode: $NOVA_MAX_STEPS"

          timeout 280 python3 nova_ci_runner.py "$TARGET" 2>&1 | tee nova_run.log
          EXIT_CODE=${PIPESTATUS[0]}
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          echo "Nova CI Runner finished (exit $EXIT_CODE)"
          exit 0  # always succeed so the issue/artifact steps run

      # ── 9. COLLECT FINDINGS ───────────────────────────────────────────────────
      - name: Collect findings
        id: findings
        run: |
          LINES=$(wc -l < nova_run.log 2>/dev/null || echo 0)
          echo "lines=$LINES" >> $GITHUB_OUTPUT

          # Extract finding lines
          grep -iE "CRITICAL|HIGH|MEDIUM|finding|vuln|CVE|SQLi|XSS|SSRF|RCE|IDOR|bypass|exploit|inject" \
            nova_run.log | tail -150 > findings_summary.txt 2>/dev/null || true

          # Count critical/high
          CRIT=$(grep -cE "CRITICAL|HIGH" nova_run.log 2>/dev/null || echo 0)
          echo "critical=$CRIT" >> $GITHUB_OUTPUT

          tail -c 65000 nova_run.log > nova_trimmed.log

          # Grab consolidated JSON if exists
          LATEST_JSON=$(ls /root/nova_workspace/nova_ci_all_findings_*.json 2>/dev/null | tail -1)
          if [ -n "$LATEST_JSON" ]; then
            cp "$LATEST_JSON" nova_findings.json
            echo "json_findings=nova_findings.json" >> $GITHUB_OUTPUT
          fi

      # ── 10. GITHUB ISSUE ──────────────────────────────────────────────────────
      - name: Post findings as GitHub Issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const log = fs.readFileSync('nova_trimmed.log', 'utf8');
            const summary = fs.existsSync('findings_summary.txt')
              ? fs.readFileSync('findings_summary.txt', 'utf8') : '';
            let jsonBlock = '';
            if (fs.existsSync('nova_findings.json')) {
              try {
                const j = JSON.parse(fs.readFileSync('nova_findings.json','utf8'));
                jsonBlock = `**Total findings:** ${j.total} | **Critical/High:** ${j.critical_high}`;
              } catch(e) {}
            }

            const date = new Date().toISOString().split('T')[0];
            const target = '${{ steps.target.outputs.target }}';
            const model = '${{ inputs.model }}' || 'llama3.1:8b';
            const critical = '${{ steps.findings.outputs.critical }}';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const modules = [
              'recon','full_stack','hunt','sqli','ssrf','fuzz','jwt',
              'proto_pollution','race','llm_injection','zero_day',
              'orchestrate','swarm','pipeline','nextgen','kali',
              'daybreak','sandbox','patch','detect','audit_report',
              'triage','report'
            ].join(' → ');

            const body = `## Nova Arsenal — Full Hunt Results

**Target:** \`${target}\`
**Model:** \`${model}\` (Ollama — local, zero API cost)
**Date:** ${date}
**Critical/High hits:** ${critical}
${jsonBlock}
**Run:** [View full logs + artifacts](${runUrl})

**Modules run:** \`${modules}\`

---

${summary ? `### Findings Keywords Detected\n\`\`\`\n${summary.slice(0,4000)}\n\`\`\`` : ''}

---

<details>
<summary>Full Nova Output (click to expand)</summary>

\`\`\`
${log}
\`\`\`

</details>
`;
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Nova: ${target} [${date}] — ${critical} critical/high hits`,
              body,
              labels: ['nova-findings', 'automated']
            });
            console.log('Issue:', issue.data.html_url);

      # ── 11. TELEGRAM: COMPLETE ────────────────────────────────────────────────
      - name: Notify completion
        if: always()
        env:
          NOVA_TELEGRAM_TOKEN: ${{ secrets.NOVA_TELEGRAM_TOKEN }}
          NOVA_TELEGRAM_CHAT_ID: ${{ secrets.NOVA_TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$NOVA_TELEGRAM_TOKEN" ] && [ -n "$NOVA_TELEGRAM_CHAT_ID" ]; then
            TARGET="${{ steps.target.outputs.target }}"
            CRIT="${{ steps.findings.outputs.critical }}"
            LINES="${{ steps.findings.outputs.lines }}"
            EMOJI="✅"; if [ "${{ job.status }}" != "success" ]; then EMOJI="⚠️"; fi
            MSG="${EMOJI} *Nova Hunt Complete*%0A%0ATarget: \`$TARGET\`%0ACritical/High: ${CRIT}%0ALog lines: ${LINES}%0AModules: ALL 23 modes run%0ASee Issues tab for full report"
            curl -s "https://api.telegram.org/bot${NOVA_TELEGRAM_TOKEN}/sendMessage" \
              -d "chat_id=${NOVA_TELEGRAM_CHAT_ID}&text=${MSG}&parse_mode=Markdown" > /dev/null || true
          fi

      # ── 12. ARTIFACTS ─────────────────────────────────────────────────────────
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nova-full-arsenal-${{ github.run_id }}
          path: |
            nova_run.log
            findings_summary.txt
            nova_findings.json
          retention-days: 90
