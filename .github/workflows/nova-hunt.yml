name: Nova Arsenal Hunt

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target domain (leave empty to use targets_priority.txt)'
        required: false
        default: ''
      model:
        description: 'Ollama model'
        required: false
        default: 'llama3.1:8b'
        type: choice
        options:
          - llama3.1:8b
          - qwen2.5:7b
          - deepseek-r1:7b
          - mistral:7b
  schedule:
    - cron: '0 3 * * 1'

permissions:
  issues: write
  contents: read

jobs:
  nova-hunt:
    name: Nova Hunt
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: nova-pip-${{ hashFiles('requirements-ci.txt') }}
          restore-keys: nova-pip-

      - name: Install Python dependencies
        run: pip install -r requirements-ci.txt

      - name: Install Playwright browsers
        run: python -m playwright install chromium --with-deps

      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.ai/install.sh | sh
          ollama serve &
          echo "Waiting for Ollama to start..."
          for i in $(seq 1 30); do
            curl -s http://localhost:11434/api/tags > /dev/null 2>&1 && break
            sleep 2
          done
          echo "Ollama is ready"

      - name: Cache Ollama model
        id: ollama-cache
        uses: actions/cache@v4
        with:
          path: ~/.ollama
          key: ollama-model-${{ inputs.model }}

      - name: Pull model
        run: |
          MODEL="${{ inputs.model }}"
          if [ -z "$MODEL" ]; then MODEL="llama3.1:8b"; fi
          echo "Pulling $MODEL..."
          ollama pull "$MODEL"
          echo "Model ready"

      - name: Resolve target
        id: target
        run: |
          TARGET="${{ inputs.target }}"
          if [ -z "$TARGET" ]; then
            TARGET=$(grep -v '^#' targets_priority.txt | grep -v '^$' | head -1)
          fi
          echo "target=$TARGET" >> $GITHUB_OUTPUT
          echo "Nova will hunt: $TARGET"

      - name: Run Nova Arsenal
        env:
          NOVA_LLM_URL: http://localhost:11434
          NOVA_LLM_MODEL: ${{ inputs.model }}
          NOVA_MAX_STEPS: '30'
        run: |
          MODEL="${NOVA_LLM_MODEL}"
          if [ -z "$MODEL" ]; then MODEL="llama3.1:8b"; fi
          export NOVA_LLM_MODEL="$MODEL"
          TARGET="https://${{ steps.target.outputs.target }}"
          mkdir -p ~/nova_workspace
          echo "Starting Nova hunt on $TARGET with model $MODEL"
          timeout 240 python3 nova.py "Hunt $TARGET for all vulnerabilities, triage findings, generate H1-ready report" 2>&1 | tee nova_run.log || true
          echo "Nova run complete"

      - name: Trim log for issue
        run: tail -c 60000 nova_run.log > nova_trimmed.log

      - name: Post findings as GitHub Issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const log = fs.readFileSync('nova_trimmed.log', 'utf8');
            const date = new Date().toISOString().split('T')[0];
            const target = '${{ steps.target.outputs.target }}';
            const model = '${{ inputs.model }}' || 'llama3.1:8b';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const body = `## Nova Arsenal Hunt Results

**Target:** \`${target}\`
**Model:** \`${model}\`
**Date:** ${date}
**Run:** [View full logs](${runUrl})

---

<details>
<summary>Full Output (click to expand)</summary>

\`\`\`
${log}
\`\`\`

</details>
`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Nova Hunt: ${target} [${date}]`,
              body,
              labels: ['nova-findings', 'automated']
            });

      - name: Upload full log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nova-log-${{ github.run_id }}
          path: nova_run.log
          retention-days: 30
