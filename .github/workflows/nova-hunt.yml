name: Nova Arsenal Hunt

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target domain (empty uses targets_priority.txt)'
        required: false
        default: ''
      model:
        description: 'Ollama model'
        required: false
        default: 'llama3.1:8b'
        type: choice
        options:
          - llama3.1:8b
          - qwen2.5:7b
          - deepseek-r1:7b
          - mistral:7b
      steps:
        description: 'Max agent steps per mode'
        required: false
        default: '40'
  schedule:
    - cron: '0 3 * * 1'

permissions:
  issues: write
  contents: write

jobs:
  nova-hunt:
    name: Nova Full Arsenal
    runs-on: ubuntu-latest
    container:
      image: kalilinux/kali-last-release
      options: --privileged --user root
    timeout-minutes: 330

    steps:

      - name: Bootstrap Kali tools
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update -qq 2>/dev/null
          apt-get install -y -qq python3 python3-pip python3-dev curl wget git \
            build-essential libssl-dev nmap masscan dnsutils whois dnsrecon \
            theharvester amass sublist3r nikto whatweb wafw00f sqlmap \
            gobuster dirb netcat-openbsd tcpdump hydra medusa \
            chromium chromium-driver golang-go 2>/dev/null || true
          export GOPATH=/root/go
          export PATH=$PATH:/root/go/bin
          go install github.com/ffuf/ffuf/v2@latest 2>/dev/null || true
          go install github.com/projectdiscovery/subfinder/v2/cmd/subfinder@latest 2>/dev/null || true
          go install github.com/projectdiscovery/httpx/cmd/httpx@latest 2>/dev/null || true
          go install github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest 2>/dev/null || true
          go install github.com/projectdiscovery/katana/cmd/katana@latest 2>/dev/null || true
          go install github.com/lc/gau/v2/cmd/gau@latest 2>/dev/null || true
          go install github.com/tomnomnom/waybackurls@latest 2>/dev/null || true
          go install github.com/hahwul/dalfox/v2@latest 2>/dev/null || true
          pip3 install --quiet --break-system-packages arjun 2>/dev/null || true
          echo "Kali bootstrap done"

      - name: Checkout Nova Arsenal
        uses: actions/checkout@v4

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: nova-pip-${{ hashFiles('requirements-ci.txt') }}
          restore-keys: nova-pip-

      - name: Install Python dependencies
        run: |
          pip3 install --quiet --break-system-packages -r requirements-ci.txt 2>/dev/null || true
          python3 -m playwright install chromium --with-deps 2>/dev/null || true

      - name: Download wordlists
        run: |
          mkdir -p ~/nova_workspace/wordlists
          curl -sL "https://raw.githubusercontent.com/danielmiessler/SecLists/master/Discovery/Web-Content/common.txt" \
            -o ~/nova_workspace/wordlists/common.txt 2>/dev/null || true
          curl -sL "https://raw.githubusercontent.com/danielmiessler/SecLists/master/Discovery/DNS/subdomains-top1million-20000.txt" \
            -o ~/nova_workspace/wordlists/subdomains.txt 2>/dev/null || true

      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.ai/install.sh | sh
          ollama serve > /tmp/ollama.log 2>&1 &
          for i in $(seq 1 40); do
            curl -s http://localhost:11434/api/tags > /dev/null 2>&1 && echo "Ollama ready" && break
            sleep 3
          done

      - name: Cache Ollama model
        uses: actions/cache@v4
        with:
          path: ~/.ollama
          key: ollama-${{ inputs.model || 'llama3.1:8b' }}

      - name: Pull Ollama model
        run: |
          MODEL="${{ inputs.model }}"
          if [ -z "$MODEL" ]; then MODEL="llama3.1:8b"; fi
          ollama pull "$MODEL"
          ollama list

      - name: Resolve target
        id: target
        run: |
          TARGET="${{ inputs.target }}"
          if [ -z "$TARGET" ]; then
            TARGET=$(grep -v '^#' targets_priority.txt | grep -v '^$' | head -1)
          fi
          if ! echo "$TARGET" | grep -q '^http'; then
            TARGET="https://$TARGET"
          fi
          echo "target=$TARGET" >> $GITHUB_OUTPUT
          echo "Hunting: $TARGET"

      - name: Notify hunt start
        env:
          TG_TOKEN: ${{ secrets.NOVA_TELEGRAM_TOKEN }}
          TG_CHAT: ${{ secrets.NOVA_TELEGRAM_CHAT_ID }}
        run: |
          TARGET="${{ steps.target.outputs.target }}"
          MODEL="${{ inputs.model }}"
          if [ -z "$MODEL" ]; then MODEL="llama3.1:8b"; fi
          python3 -c "
import os, urllib.request, urllib.parse
token = os.environ.get('TG_TOKEN','')
chat  = os.environ.get('TG_CHAT','')
if token and chat:
    msg = 'Nova Arsenal Hunt Started\n\nTarget: $TARGET\nModel: $MODEL\nModules: ALL 25 modes running\nAlerts: live Critical and High findings'
    data = urllib.parse.urlencode({'chat_id': chat, 'text': msg}).encode()
    try:
        urllib.request.urlopen(urllib.request.Request('https://api.telegram.org/bot' + token + '/sendMessage', data=data), timeout=10)
        print('Telegram: notified')
    except Exception as e:
        print('Telegram error:', e)
"

      - name: Run Nova CI Runner
        id: nova
        env:
          NOVA_LLM_URL: http://localhost:11434
          NOVA_LLM_MODEL: ${{ inputs.model || 'llama3.1:8b' }}
          NOVA_MAX_STEPS: ${{ inputs.steps || '40' }}
          NOVA_TELEGRAM_TOKEN: ${{ secrets.NOVA_TELEGRAM_TOKEN }}
          NOVA_TELEGRAM_CHAT_ID: ${{ secrets.NOVA_TELEGRAM_CHAT_ID }}
          NOVA_WORKSPACE: /root/nova_workspace
          NOVA_CI_MODE: '1'
          NOVA_TOOL_CLONE_DIR: /opt/nova-tools
          GOPATH: /root/go
          PATH: /root/go/bin:/usr/local/go/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
        run: |
          TARGET="${{ steps.target.outputs.target }}"
          MODEL="${NOVA_LLM_MODEL}"
          if [ -z "$MODEL" ]; then MODEL="llama3.1:8b"; fi
          export NOVA_LLM_MODEL="$MODEL"
          mkdir -p /root/nova_workspace
          echo "Target: $TARGET | Model: $MODEL | Steps: $NOVA_MAX_STEPS"
          timeout 280 python3 nova_ci_runner.py "$TARGET" 2>&1 | tee nova_run.log || true

      - name: Collect findings
        id: findings
        run: |
          LINES=$(wc -l < nova_run.log 2>/dev/null || echo 0)
          echo "lines=$LINES" >> $GITHUB_OUTPUT
          grep -iE "CRITICAL|HIGH|MEDIUM|finding|vuln|CVE|SQLi|XSS|SSRF|RCE|IDOR|bypass|exploit|inject" \
            nova_run.log | tail -150 > findings_summary.txt 2>/dev/null || true
          CRIT=$(grep -cE "CRITICAL|HIGH" nova_run.log 2>/dev/null || echo 0)
          echo "critical=$CRIT" >> $GITHUB_OUTPUT
          tail -c 65000 nova_run.log > nova_trimmed.log
          LATEST=$(ls /root/nova_workspace/nova_ci_all_findings_*.json 2>/dev/null | tail -1)
          if [ -n "$LATEST" ]; then cp "$LATEST" nova_findings.json; fi

      - name: Post findings as GitHub Issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const log = fs.existsSync('nova_trimmed.log') ? fs.readFileSync('nova_trimmed.log', 'utf8') : '(no log)';
            const summary = fs.existsSync('findings_summary.txt') ? fs.readFileSync('findings_summary.txt', 'utf8') : '';
            const date = new Date().toISOString().split('T')[0];
            const target = '${{ steps.target.outputs.target }}';
            const model = '${{ inputs.model }}' || 'llama3.1:8b';
            const critical = '${{ steps.findings.outputs.critical }}';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              '## Nova Arsenal Hunt Results',
              '',
              `**Target:** \`${target}\``,
              `**Model:** \`${model}\` (Ollama local, zero API cost)`,
              `**Date:** ${date}`,
              `**Critical/High hits:** ${critical}`,
              `**Run:** [View full logs](${runUrl})`,
              '',
              summary ? `### Key Findings\n\`\`\`\n${summary.slice(0,4000)}\n\`\`\`` : '',
              '',
              '<details><summary>Full Nova Output</summary>',
              '',
              '```',
              log,
              '```',
              '',
              '</details>'
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Nova: ${target} [${date}] - ${critical} critical/high`,
              body,
              labels: ['nova-findings', 'automated']
            });

      - name: Notify completion
        if: always()
        env:
          TG_TOKEN: ${{ secrets.NOVA_TELEGRAM_TOKEN }}
          TG_CHAT: ${{ secrets.NOVA_TELEGRAM_CHAT_ID }}
        run: |
          TARGET="${{ steps.target.outputs.target }}"
          CRIT="${{ steps.findings.outputs.critical }}"
          LINES="${{ steps.findings.outputs.lines }}"
          STATUS="${{ job.status }}"
          python3 -c "
import os, urllib.request, urllib.parse
token = os.environ.get('TG_TOKEN','')
chat  = os.environ.get('TG_CHAT','')
if token and chat:
    msg = 'Nova Hunt Complete\n\nTarget: $TARGET\nCritical/High: $CRIT\nLog lines: $LINES\nStatus: $STATUS\nFull report in Issues tab'
    data = urllib.parse.urlencode({'chat_id': chat, 'text': msg}).encode()
    try:
        urllib.request.urlopen(urllib.request.Request('https://api.telegram.org/bot' + token + '/sendMessage', data=data), timeout=10)
    except Exception as e:
        print('Telegram error:', e)
"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nova-results-${{ github.run_id }}
          path: |
            nova_run.log
            findings_summary.txt
            nova_findings.json
          retention-days: 90
