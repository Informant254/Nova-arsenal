apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nova-arsenal
  namespace: nova-arsenal
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    # SSL/TLS configuration (uncomment and configure)
    # cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  # Uncomment for TLS
  # tls:
  #   - hosts:
  #       - nova.yourdomain.com
  #     secretName: nova-tls
  rules:
    - host: nova.yourdomain.com  # Change to your domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nova-web
                port:
                  number: 3000
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: nova-agent
                port:
                  number: 8080
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: nova-agent
                port:
                  number: 8080
