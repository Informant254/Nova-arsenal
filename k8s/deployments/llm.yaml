apiVersion: apps/v1
kind: Deployment
metadata:
  name: nova-llm
  namespace: nova-arsenal
  labels:
    app: nova-llm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nova-llm
  template:
    metadata:
      labels:
        app: nova-llm
    spec:
      containers:
        - name: llm
          image: ollama/ollama:latest
          ports:
            - containerPort: 11434
              protocol: TCP
          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama
          resources:
            limits:
              memory: "8Gi"
              cpu: "4"
            requests:
              memory: "4Gi"
              cpu: "2"
          livenessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: ollama-data
          persistentVolumeClaim:
            claimName: nova-ollama-data
