apiVersion: apps/v1
kind: Deployment
metadata:
  name: nova-agent
  namespace: nova-arsenal
  labels:
    app: nova-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nova-agent
  template:
    metadata:
      labels:
        app: nova-agent
    spec:
      containers:
        - name: agent
          image: ghcr.io/informant254/nova-agent:latest
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: nova-secrets
                  key: database-url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: nova-secrets
                  key: jwt-secret
            - name: NOVA_LLM_URL
              value: "http://nova-llm:11434"
            - name: NOVA_WORKSPACE
              value: "/workspace"
          volumeMounts:
            - name: workspace
              mountPath: /workspace
          resources:
            limits:
              memory: "2Gi"
              cpu: "2"
            requests:
              memory: "1Gi"
              cpu: "1"
          livenessProbe:
            exec:
              command:
                - python
                - -c
                - "import nova_arsenal; print('ok')"
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            exec:
              command:
                - python
                - -c
                - "import nova_arsenal; print('ok')"
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: nova-workspace
