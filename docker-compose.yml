version: '3.8'

services:
  agent:
    build:
      context: .
      dockerfile: containers/Dockerfile.agent
    container_name: nova-agent
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///workspace/nova.db
      - NOVA_LLM_URL=http://llm:11434
      - NOVA_WORKSPACE=/workspace
      - JWT_SECRET=${JWT_SECRET:-changeme}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - workspace:/workspace
      - ./nova_arsenal:/app/nova_arsenal:ro
    ports:
      - "${AGENT_PORT:-8080}:8080"
    networks:
      - agent-net
    depends_on:
      sandbox:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import nova_arsenal; print('ok')"]
      interval: 30s
      timeout: 10s
      start_period: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
    restart: unless-stopped

  sandbox:
    build:
      context: .
      dockerfile: containers/Dockerfile.kali
    container_name: nova-sandbox
    cap_drop:
      - ALL
    cap_add:
      - NET_RAW
      - NET_ADMIN
      - SYS_PTRACE
    security_opt:
      - no-new-privileges:true
    networks:
      - agent-net
      - sandbox-net
    healthcheck:
      test: ["CMD", "nmap", "--version"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '4.0'
    pid: "4096"
    restart: unless-stopped

  llm:
    image: ollama/ollama:latest
    container_name: nova-llm
    ports:
      - "${LLM_PORT:-11434}:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - agent-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 8G
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: containers/Dockerfile.web
    container_name: nova-web
    environment:
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-changeme}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - AGENT_API_URL=http://agent:8080
      - DATABASE_URL=file:/app/data/nova.db
    volumes:
      - web-data:/app/data
    ports:
      - "${WEB_PORT:-3000}:3000"
    networks:
      - agent-net
    depends_on:
      agent:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    restart: unless-stopped

volumes:
  workspace:
  ollama-data:
  web-data:

networks:
  agent-net:
    driver: bridge
  sandbox-net:
    driver: bridge
    internal: true
